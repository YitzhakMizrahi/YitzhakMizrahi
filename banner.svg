<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090e"/>
      <stop offset="50%" stop-color="#0b0b12"/>
      <stop offset="100%" stop-color="#09090e"/>
    </linearGradient>

    <radialGradient id="atmosphere" cx="50%" cy="61%" r="35%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.035"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.3"/>
    </radialGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0"/>
      <stop offset="15%" stop-color="#4a9eff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.4"/>
      <stop offset="85%" stop-color="#4a9eff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="dotHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5cb3ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>

    <!-- TEXT SHINE — sweeps bottom-to-top, 5s synced with dot -->
    <linearGradient id="textShine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#d8d8e4"/>
      <stop stop-color="#d8d8e4">
        <animate attributeName="offset" values="1.25;-0.40;-0.40" dur="5s" keyTimes="0;0.7;1" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0 0 1 1"/>
      </stop>
      <stop stop-color="#ffffff">
        <animate attributeName="offset" values="1.37;-0.28;-0.28" dur="5s" keyTimes="0;0.7;1" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0 0 1 1"/>
      </stop>
      <stop stop-color="#ffffff">
        <animate attributeName="offset" values="1.45;-0.20;-0.20" dur="5s" keyTimes="0;0.7;1" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0 0 1 1"/>
      </stop>
      <stop stop-color="#d8d8e4">
        <animate attributeName="offset" values="1.57;-0.08;-0.08" dur="5s" keyTimes="0;0.7;1" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0 0 1 1"/>
      </stop>
      <stop offset="1" stop-color="#d8d8e4"/>
    </linearGradient>
  </defs>

  <!-- ======== BACKGROUND ======== -->

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#atmosphere)"/>
  <rect width="1280" height="320" fill="url(#vignette)"/>

  <!-- ============================================================ -->
  <!--  RINGS — 10s cycle (2x heartbeat), 2 rings staggered by 5s  -->
  <!--  Launch on the downbeat, when :: fires and dot is dimmest    -->
  <!-- ============================================================ -->

  <!-- Ring A — launches at t=0 (with :: blink) -->
  <circle cx="640" cy="195" r="3" fill="none" stroke="#4a9eff" stroke-width="0.7" opacity="0">
    <animate attributeName="r" values="3;200" dur="10s" begin="0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.15 0.8 0.3 1"/>
    <animate attributeName="opacity" values="0;0.22;0" dur="10s" begin="0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.05;1" keySplines="0.4 0 1 1; 0.1 0.6 0.3 1"/>
    <animate attributeName="stroke-width" values="0.7;0.12" dur="10s" begin="0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.15 0.8 0.3 1"/>
  </circle>

  <!-- Ring B — launches at t=5 (with next :: blink) -->
  <circle cx="640" cy="195" r="3" fill="none" stroke="#4a9eff" stroke-width="0.7" opacity="0">
    <animate attributeName="r" values="3;200" dur="10s" begin="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.15 0.8 0.3 1"/>
    <animate attributeName="opacity" values="0;0.22;0" dur="10s" begin="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.05;1" keySplines="0.4 0 1 1; 0.1 0.6 0.3 1"/>
    <animate attributeName="stroke-width" values="0.7;0.12" dur="10s" begin="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.15 0.8 0.3 1"/>
  </circle>

  <!-- ======== LINE ======== -->

  <line x1="0" y1="195" x2="1280" y2="195" stroke="url(#lineGrad)" stroke-width="0.6"/>

  <!-- ================================================================= -->
  <!--  ON-LINE DATA POINTS — propagation wave radiating from center     -->
  <!--  Inner points (5s cycle): ripple every heartbeat                  -->
  <!--  Outer points (10s cycle): ripple every other heartbeat           -->
  <!--  Begin offsets create center-outward wave after dot peak (t=2.5)  -->
  <!-- ================================================================= -->

  <!-- Inner left — 110px from center, 5s, peaks ~t=2.8 -->
  <circle cx="530" cy="195" r="0.9" fill="#4a9eff" opacity="0">
    <animate attributeName="opacity" values="0.05;0.35;0.05" dur="5s" begin="2.2s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
    <animate attributeName="r" values="0.9;1.4;0.9" dur="5s" begin="2.2s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
  </circle>

  <!-- Inner right — 110px from center, 5s, peaks ~t=2.8 -->
  <circle cx="750" cy="195" r="0.9" fill="#4a9eff" opacity="0">
    <animate attributeName="opacity" values="0.05;0.35;0.05" dur="5s" begin="2.2s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
    <animate attributeName="r" values="0.9;1.4;0.9" dur="5s" begin="2.2s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
  </circle>

  <!-- Mid left — 192px from center, 5s, peaks ~t=3.0 -->
  <circle cx="448" cy="195" r="0.9" fill="#4a9eff" opacity="0">
    <animate attributeName="opacity" values="0.06;0.28;0.06" dur="5s" begin="2.4s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
    <animate attributeName="r" values="0.9;1.3;0.9" dur="5s" begin="2.4s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
  </circle>

  <!-- Mid right — 192px from center, 5s, peaks ~t=3.0 -->
  <circle cx="832" cy="195" r="0.9" fill="#4a9eff" opacity="0">
    <animate attributeName="opacity" values="0.06;0.28;0.06" dur="5s" begin="2.4s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
    <animate attributeName="r" values="0.9;1.3;0.9" dur="5s" begin="2.4s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
  </circle>

  <!-- Outer left — 275px from center, 10s, peaks ~t=3.2 (every other beat) -->
  <circle cx="365" cy="195" r="1" fill="#4a9eff" opacity="0">
    <animate attributeName="opacity" values="0.04;0.22;0.04" dur="10s" begin="2.0s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
  </circle>

  <!-- Outer right — 295px from center, 10s, peaks ~t=3.2 (every other beat) -->
  <circle cx="935" cy="195" r="1" fill="#4a9eff" opacity="0">
    <animate attributeName="opacity" values="0.04;0.22;0.04" dur="10s" begin="2.0s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
  </circle>

  <!-- Far left — 395px from center, 10s, peaks ~t=3.5 (every other beat) -->
  <circle cx="245" cy="195" r="0.8" fill="#3e8edf" opacity="0">
    <animate attributeName="opacity" values="0.03;0.16;0.03" dur="10s" begin="2.3s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
  </circle>

  <!-- Far right — 400px from center, 10s, peaks ~t=3.5 (every other beat) -->
  <circle cx="1040" cy="195" r="0.8" fill="#3e8edf" opacity="0">
    <animate attributeName="opacity" values="0.03;0.16;0.03" dur="10s" begin="2.3s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
  </circle>

  <!-- ============================================================ -->
  <!--  OFF-LINE DATA POINTS — the noise                            -->
  <!--  Prime-number cycles: 7, 11, 13, 17, 19, 23                 -->
  <!--  They never phase-lock with the 5s heartbeat. By design.     -->
  <!-- ============================================================ -->

  <circle cx="410" cy="185" r="0.6" fill="#4090df" opacity="0">
    <animate attributeName="opacity" values="0.03;0.17;0.03" dur="11s" keyTimes="0;0.15;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.12 1" repeatCount="indefinite"/>
  </circle>

  <circle cx="490" cy="204" r="0.6" fill="#4090df" opacity="0">
    <animate attributeName="opacity" values="0.02;0.12;0.02" dur="23s" keyTimes="0;0.08;1" calcMode="spline" keySplines="0.5 0 1 1; 0 0 0.08 1" repeatCount="indefinite"/>
  </circle>

  <circle cx="555" cy="207" r="0.6" fill="#4090df" opacity="0">
    <animate attributeName="opacity" values="0.03;0.15;0.03" dur="13s" keyTimes="0;0.18;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.15 1" repeatCount="indefinite"/>
  </circle>

  <circle cx="715" cy="184" r="0.7" fill="#4090df" opacity="0">
    <animate attributeName="opacity" values="0.03;0.19;0.03" dur="17s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.5 0 1 1; 0 0 0.1 1" repeatCount="indefinite"/>
  </circle>

  <circle cx="785" cy="208" r="0.6" fill="#4090df" opacity="0">
    <animate attributeName="opacity" values="0.02;0.15;0.02" dur="19s" keyTimes="0;0.12;1" calcMode="spline" keySplines="0.4 0 1 1; 0 0 0.1 1" repeatCount="indefinite"/>
  </circle>

  <circle cx="870" cy="206" r="0.6" fill="#4090df" opacity="0">
    <animate attributeName="opacity" values="0.02;0.14;0.02" dur="7s" keyTimes="0;0.1;1" calcMode="spline" keySplines="0.5 0 1 1; 0 0 0.08 1" repeatCount="indefinite"/>
  </circle>

  <!-- ======== CENTER DOT — the heartbeat origin ======== -->

  <!-- Halo — counter-breathes (expands/fades when dot peaks) -->
  <circle cx="640" cy="195" r="8" fill="url(#dotHalo)" opacity="0.4">
    <animate attributeName="r" values="8;14;8" dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.4;0.15;0.4" dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </circle>

  <!-- Core dot — peaks at t=2.5s, full commit: opacity 1.0, color flare, bigger pulse -->
  <circle cx="640" cy="195" r="2" fill="#5cb3ff" opacity="0.6">
    <animate attributeName="r" values="2;3.5;2" dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.6;1.0;0.6" dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="fill" values="#5cb3ff;#7cc8ff;#5cb3ff" dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </circle>

  <!-- ======== TYPOGRAPHY ======== -->

  <!-- :: — 5s cycle, snaps at t=0 (counterpoint: fires when dot is dimmest) -->
  <!-- Base opacity 0.2: always a ghost present, even at rest -->
  <text x="525" y="142" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono','Consolas',monospace" font-size="17" fill="#4a9eff" letter-spacing="3" opacity="0.2">
    ::
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" keyTimes="0;0.06;1" calcMode="spline" keySplines="0.9 0 1 1; 0 0 0.06 1" repeatCount="indefinite"/>
  </text>

  <!-- yzk — gradient shine + opacity breath, 5s synced with dot -->
  <text x="572" y="142" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono','Consolas',monospace" font-size="54" font-weight="300" fill="url(#textShine)" letter-spacing="14">
    yzk
    <animate attributeName="opacity" values="0.84;0.98;0.98;0.84" dur="5s" keyTimes="0;0.35;0.65;1" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.1 0 0.9 1; 0.4 0 0.6 1"/>
  </text>

  <!-- signal over noise. — completely still. The quietest element. Muted system blue. -->
  <text x="640" y="222" text-anchor="middle" font-family="'SF Mono','Fira Code','Cascadia Code','JetBrains Mono','Consolas',monospace" font-size="10.5" fill="#4a6a8a" letter-spacing="8" opacity="0.45">
    signal over noise.
  </text>
</svg>
